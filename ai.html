<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tic Tac Toe</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-top: 40px;
    }

    /* Home button in top-left corner */
    #homeBtn {
        position: fixed;
        top: 15px;
        left: 15px;
        padding: 10px 16px;
        background: #333;
        color: white;
        text-decoration: none;
        font-size: 16px;
        border-radius: 6px;
    }
    #homeBtn:hover {
        background: #555;
    }

    h1 {
        margin-bottom: 20px;
    }

    #board {
        display: grid;
        grid-template-columns: repeat(3, 100px);
        grid-template-rows: repeat(3, 100px);
        gap: 5px;
    }

    .cell {
        width: 100px;
        height: 100px;
        background: white;
        border: 2px solid #333;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 48px;
        cursor: pointer;
        user-select: none;
    }
    .cell.taken {
        cursor: default;
        color: #333;
    }

    #message {
        margin-top: 20px;
        font-size: 22px;
        font-weight: bold;
    }

    #playAgain {
        margin-top: 20px;
        padding: 10px 20px;
        font-size: 18px;
        display: none;
        cursor: pointer;
    }
</style>
</head>
<body>

<!-- Home Button -->
<a id="homeBtn" href="fromscratch.html">Home</a>

<h1>Tic Tac Toe</h1>

<div id="board"></div>
<div id="message"></div>
<button id="playAgain">Play Again</button>

<script>
    const board = document.getElementById("board");
    const message = document.getElementById("message");
    const playAgainBtn = document.getElementById("playAgain");

    let cells;
    let gameOver;

    const wins = [
        [0,1,2], [3,4,5], [6,7,8],
        [0,3,6], [1,4,7], [2,5,8],
        [0,4,8], [2,4,6]
    ];

    function initGame() {
        cells = Array(9).fill("");
        gameOver = false;
        message.textContent = "";
        playAgainBtn.style.display = "none";

        board.innerHTML = "";
        for (let i = 0; i < 9; i++) {
            const div = document.createElement("div");
            div.classList.add("cell");
            div.dataset.index = i;
            div.addEventListener("click", playerMove);
            board.appendChild(div);
        }
    }

    function playerMove(e) {
        if (gameOver) return;

        const index = e.target.dataset.index;
        if (cells[index] !== "") return;

        cells[index] = "X";
        updateBoard();

        if (checkWin("X")) {
            endGame("You win!");
            return;
        }

        if (isBoardFull()) {
            endGame("It's a draw.");
            return;
        }

        setTimeout(computerMove, 300);
    }

    function computerMove() {
        if (gameOver) return;

        const empty = cells
            .map((v, i) => v === "" ? i : null)
            .filter(v => v !== null);

        if (empty.length === 0) return;

        const choice = empty[Math.floor(Math.random() * empty.length)];
        cells[choice] = "O";
        updateBoard();

        if (checkWin("O")) {
            endGame("Computer wins!");
            return;
        }

        if (isBoardFull()) {
            endGame("It's a draw.");
        }
    }

    function updateBoard() {
        document.querySelectorAll(".cell").forEach((cell, i) => {
            cell.textContent = cells[i];
            if (cells[i] !== "") cell.classList.add("taken");
        });
    }

    function checkWin(player) {
        return wins.some(combo =>
            combo.every(i => cells[i] === player)
        );
    }

    function isBoardFull() {
        return cells.every(c => c !== "");
    }

    function endGame(msg) {
        gameOver = true;
        message.textContent = msg;
        playAgainBtn.style.display = "inline-block";
    }

    playAgainBtn.addEventListener("click", initGame);

    initGame();
</script>

</body>
</html>
